version: "3.9"

services:
  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"
    restart: always

  worker:
    build: .
    container_name: celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - redis
    volumes:
      - .:/app
    env_file:
      - .env
    restart: always